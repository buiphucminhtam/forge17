version: '3.8'

services:
  daemon:
    build: .
    ports:
      - "8765:8765"
    volumes:
      - ./data:/app/data
      - ~/.config/mmx-cli:/home/forgewright/.config/mmx-cli
    environment:
      - SOCKET_PORT=8765
      - LOG_LEVEL=INFO

  board:
    build:
      context: ../board-ui
      dockerfile: ../board-ui/Dockerfile
    ports:
      - "3000:3000"
    depends_on:
      - daemon
    environment:
      - NEXT_PUBLIC_SOCKET_URL=http://localhost:8765
