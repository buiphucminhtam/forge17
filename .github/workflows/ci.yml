name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ═══════════════════════════════════════════════════════════
  # WAVE 1: MCP Package Checks (parallel)
  # ═══════════════════════════════════════════════════════════
  # ── Wave 1: All checks run in parallel (each installs deps independently) ──
  lint-and-format:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: mcp/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: mcp

      - name: Check ESLint
        run: npm run lint
        working-directory: mcp

      - name: Check Prettier
        run: npm run format:check
        working-directory: mcp

  typecheck:
    name: TypeScript Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: mcp/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: mcp

      - name: Type check
        run: npm run build
        working-directory: mcp

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: mcp/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: mcp

      - name: Run tests
        run: npm run test
        working-directory: mcp

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: mcp/coverage/
          retention-days: 14

  # ── Wave 1: Commit message (parallel with other checks) ──
  commitlint:
    name: Commit Message
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: mcp/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: mcp

      - name: Validate commit messages
        run: npx commitlint --from ${{ github.event.pull_request.base.sha }} --to ${{ github.event.pull_request.head.sha }}
        working-directory: mcp

  # ═══════════════════════════════════════════════════════════
  # WAVE 1: Forgenexus Package Checks (parallel)
  # ═══════════════════════════════════════════════════════════
  forgenexus-lint:
    name: Forgenexus Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: forgenexus/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: forgenexus

      - name: Check ESLint
        run: npm run lint
        working-directory: forgenexus

      - name: Check Prettier
        run: npm run format:check
        working-directory: forgenexus

  forgenexus-typecheck:
    name: Forgenexus TypeScript
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: forgenexus/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: forgenexus

      - name: Type check
        run: npm run build
        working-directory: forgenexus

  forgenexus-test:
    name: Forgenexus Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: forgenexus/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: forgenexus

      - name: Run tests
        run: npm run test
        working-directory: forgenexus

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: forgenexus-coverage-report
          path: forgenexus/coverage/
          retention-days: 14

  # ═══════════════════════════════════════════════════════════
  # WAVE 2: Coverage Gates (runs after test completes)
  # ═══════════════════════════════════════════════════════════
  # ── Wave 2: Depends on test, runs after test completes ──
  test-coverage:
    name: Coverage Gate
    runs-on: ubuntu-latest
    needs: [test]
    if: always()
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: mcp/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: mcp

      - name: Check coverage thresholds
        run: npm run test:coverage
        working-directory: mcp

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: full-coverage-report
          path: mcp/coverage/
          retention-days: 14

  forgenexus-coverage:
    name: Forgenexus Coverage Gate
    runs-on: ubuntu-latest
    needs: [forgenexus-test]
    if: always()
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: forgenexus/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: forgenexus

      - name: Check coverage thresholds
        run: npm run test:coverage
        working-directory: forgenexus

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: forgenexus-full-coverage-report
          path: forgenexus/coverage/
          retention-days: 14

  # ── Wave 2: All Wave 1 jobs must pass ──
  # This job exists to fail the overall workflow if any parallel job fails.
  # It doesn't need to run any commands — it just waits for its dependencies.
  require-all:
    name: All Checks Passed
    runs-on: ubuntu-latest
    needs: [lint-and-format, typecheck, test, commitlint, forgenexus-lint, forgenexus-typecheck, forgenexus-test]
    steps:
      - name: All checks passed
        run: echo "All CI checks passed"
